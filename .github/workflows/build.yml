name: Build NDK Daemon

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Android NDK
      uses: nttld/setup-ndk@v1
      with:
        ndk-version: r21e
        add-to-path: true

    - name: Build with ndk-build
      run: |
        cd src/main/jni
        ndk-build clean && ndk-build -j$(nproc)

    - name: Upload Binary
      uses: actions/upload-artifact@v4
      with:
        name: daemon-binary
        path: src/main/libs/**/*
